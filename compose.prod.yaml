services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_flow}
      POSTGRES_USER: ${POSTGRES_USER:-agent_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - agent-flow-pg-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agent_flow} -d ${POSTGRES_DB:-agent_flow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  agent-flow:
    container_name: agent-flow
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: prod.Dockerfile
      args:
        AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
        AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_URL: ${AUTH_URL}
        BASE_URL: ${BASE_URL}
        DATABASE_URL: ${DATABASE_URL}
        TEST_PASSWORD: ${TEST_PASSWORD}
        NEXT_PUBLIC_ENABLE_DEV_LOGIN: ${NEXT_PUBLIC_ENABLE_DEV_LOGIN}
        GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
        GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY}
        GOOGLE_SEARCH_CX: ${GOOGLE_SEARCH_CX}
        NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
        NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
        BRAVE_API_KEY: ${BRAVE_API_KEY}
        SEARXNG_API_KEY: ${SEARXNG_API_KEY}
        SEARXNG_BASE_URL: ${SEARXNG_BASE_URL}
        GROQ_API_KEY: ${GROQ_API_KEY}
    environment:
      NODE_ENV: production
      PORT: "${APP_PORT:-3063}"
      HOSTNAME: 0.0.0.0
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      BASE_URL: ${BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      TEST_PASSWORD: ${TEST_PASSWORD}
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: ${NEXT_PUBLIC_ENABLE_DEV_LOGIN}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY}
      GOOGLE_SEARCH_CX: ${GOOGLE_SEARCH_CX}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      SEARXNG_API_KEY: ${SEARXNG_API_KEY}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "${APP_PORT:-3063}:${APP_PORT:-3063}"
    restart: always

volumes:
  agent-flow-pg-data:
