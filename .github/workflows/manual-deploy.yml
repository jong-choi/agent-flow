name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string
      confirm_deploy:
        description: Type "deploy" to confirm
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy" ]; then
            echo "Deployment cancelled. Type 'deploy' to confirm."
            exit 1
          fi
          echo "Deployment confirmed."

  deploy:
    needs: validate-inputs
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_REPO_TOKEN: ${{ github.token }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ vars.AUTH_URL }}
          BASE_URL: ${{ vars.BASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          NEXT_PUBLIC_ENABLE_DEV_LOGIN: ${{ vars.NEXT_PUBLIC_ENABLE_DEV_LOGIN }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ vars.GOOGLE_SEARCH_CX }}
          NAVER_CLIENT_ID: ${{ vars.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          SEARXNG_API_KEY: ${{ secrets.SEARXNG_API_KEY }}
          SEARXNG_BASE_URL: ${{ vars.SEARXNG_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          envs: GH_REPO_TOKEN,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,AUTH_GOOGLE_ID,AUTH_GOOGLE_SECRET,AUTH_SECRET,AUTH_URL,BASE_URL,DATABASE_URL,TEST_PASSWORD,NEXT_PUBLIC_ENABLE_DEV_LOGIN,GOOGLE_AI_API_KEY,GOOGLE_SEARCH_API_KEY,GOOGLE_SEARCH_CX,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,BRAVE_API_KEY,SEARXNG_API_KEY,SEARXNG_BASE_URL,GROQ_API_KEY
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            trap 'echo "Deploy failed at line $LINENO"' ERR

            BRANCH="${{ github.event.inputs.branch }}"
            REPO_DIR=~/agent-flow
            if [ -z "${GH_REPO_TOKEN:-}" ]; then
              echo "GH_REPO_TOKEN is required"
              exit 1
            fi

            BASIC_AUTH="$(printf 'x-access-token:%s' "${GH_REPO_TOKEN}" | base64 | tr -d '\n')"
            AUTH_HEADER="AUTHORIZATION: basic ${BASIC_AUTH}"

            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            if [ ! -d "$REPO_DIR/.git" ]; then
              git -c http.extraheader="$AUTH_HEADER" clone --depth 1 --branch "$BRANCH" https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git -c http.extraheader="$AUTH_HEADER" fetch --prune origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"

            : "${POSTGRES_DB:=agent_flow}"
            : "${POSTGRES_USER:=agent_flow}"

            if [ -z "${POSTGRES_PASSWORD:-}" ]; then
              echo "POSTGRES_PASSWORD is required"
              exit 1
            fi

            if [ -z "${DATABASE_URL:-}" ]; then
              export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@agent-flow-postgres:5432/${POSTGRES_DB}"
            fi

            docker compose -f compose.prod.yaml up -d postgres
            docker compose -f compose.prod.yaml build --pull agent-flow
            docker compose -f compose.prod.yaml up -d --remove-orphans agent-flow

            docker image prune -f
            echo "Manual deploy complete"
